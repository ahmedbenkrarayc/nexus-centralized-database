databaseChangeLog:
  - changeSet:
      id: 007
      author: AhmedBenkrara
      changes:
        - createTable:
            tableName: location
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: country
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: city
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: lang
                  type: DOUBLE
                  constraints:
                    nullable: false
              - column:
                  name: lat
                  type: DOUBLE
                  constraints:
                    nullable: false
              - column:
                  name: campus_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: location
            baseColumnNames: campus_id
            referencedTableName: campus
            referencedColumnNames: id
            constraintName: fk_location_campus
            onDelete: CASCADE

      rollback:
        - dropForeignKeyConstraint:
            baseTableName: location
            constraintName: fk_location_campus
        - dropTable:
            tableName: location