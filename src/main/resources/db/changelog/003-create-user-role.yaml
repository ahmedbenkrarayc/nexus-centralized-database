databaseChangeLog:
  - changeSet:
      id: 003
      author: AhmedBenkrara
      changes:
        - createTable:
            tableName: user_role
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: assigned_at
                  type: DATETIME
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: user_role
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_role_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: user_role
            baseColumnNames: role_id
            referencedTableName: role
            referencedColumnNames: id
            constraintName: fk_user_role_role
            onDelete: CASCADE

      rollback:
        - dropForeignKeyConstraint:
            baseTableName: user_role
            constraintName: fk_user_role_user
        - dropForeignKeyConstraint:
            baseTableName: user_role
            constraintName: fk_user_role_role
        - dropTable:
            tableName: user_role