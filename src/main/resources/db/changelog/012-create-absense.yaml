databaseChangeLog:
  - changeSet:
      id: 012
      author: AhmedBenkrara
      changes:
        - createTable:
            tableName: absense
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: employee_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: start
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: end
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: approved
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: comment
                  type: VARCHAR(500)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: absense
            baseColumnNames: employee_id
            referencedTableName: employee
            referencedColumnNames: id
            constraintName: fk_absense_employee
            onDelete: CASCADE

      rollback:
        - dropForeignKeyConstraint:
            baseTableName: absense
            constraintName: fk_absense_employee
        - dropTable:
            tableName: absense